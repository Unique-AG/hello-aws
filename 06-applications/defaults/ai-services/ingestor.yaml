env:
  GUNICORN_WORKERS: 1
  GUNICORN_THREADS: 4
  GUNICORN_TIMEOUT: 300
  PORT: 8080
  LOG_LEVEL: INFO
  DOCLING_ARTIFACTS_PATH: /artifacts/docling-models
  DOWNLOAD_MODELS: "true"
  MAX_CONCURRENT_JOBS_PER_REPLICA: 2
  REDIS_DB: 5
  REDIS_JOB_TTL_SECONDS: 3600
  REDIS_QUEUE_BLOCK_TIMEOUT: 1

prometheus:
  enabled: false
probes:
  enabled: true
  liveness:
    httpGet:
      path: /probe
      port: 8080
  readiness:
    httpGet:
      path: /probe
      port: 8080
  startup:
    httpGet:
      path: /probe
      port: 8080
    failureThreshold: 30
    periodSeconds: 10

replicaCount: 1

resources:
  requests:
    cpu: 3
    memory: 12Gi
  limits:
    cpu: 4
    memory: 12Gi

securityContext:
  readOnlyRootFilesystem: false

serviceAccount:
  enabled: true

keda:
  enabled: true
  minReplicaCount: 1
  maxReplicaCount: 6
  cooldownPeriod: 600
  triggers:
    rabbitmq:
      type: rabbitmq
      metadata:
        mode: QueueLength
        protocol: http
        queueName: unique.node.ingestion.queue
        value: "5"
      authenticationRef:
        kind: TriggerAuthentication
        name: rabbitmqcluster-chat-unique-user
  extraAnnotations:
    argocd.argoproj.io/sync-wave: "10"

nodeSelector:
  scalability: steady
  lifecycle: persistent

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/instance
                operator: In
                values:
                  - ingestor
          topologyKey: kubernetes.io/hostname

volumes:
  - name: tmp-volume
    emptyDir:
      sizeLimit: 20Gi
  - name: docling-models
    persistentVolumeClaim:
      claimName: docling-models-pvc

volumeMounts:
  - mountPath: /tmp
    name: tmp-volume
  - mountPath: /artifacts/docling-models
    name: docling-models
