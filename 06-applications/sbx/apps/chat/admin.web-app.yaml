spec:
  name: web-app-admin
  autoSync: false
  sources:
    - repoURL: '<GITHUB_REPO_URL>'
      targetRevision: <GIT_TARGET_REVISION>
      ref: values
    - repoURL: ghcr.io/unique-ag/helm-charts
      chart: web-app
      targetRevision: 5.1.0
      helm:
        releaseName: web-app-admin
        valueFiles:
          - $values/06-applications/defaults/web-apps/admin.yaml
          - $values/06-applications/sbx/value-overlays/web-apps/_all.yaml
          - $values/06-applications/sbx/value-overlays/web-apps/admin.yaml
        valuesObject:
          image:
            tag: "2026.22.0"
