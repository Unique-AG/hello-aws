spec:
  name: ingestor
  autoSync: false
  sources:
    - repoURL: 'https://github.com/unique-ag/hello-aws'
      targetRevision: deploy/sbx
      ref: values
    - chart: raw
      repoURL: "https://bedag.github.io/helm-charts"
      targetRevision: 2.0.0
      helm:
        releaseName: docling-models-pvc
        valuesObject:
          resources:
            - apiVersion: v1
              kind: PersistentVolumeClaim
              metadata:
                name: docling-models-pvc
                namespace: unique
              spec:
                accessModes: ["ReadWriteMany"]
                storageClassName: efs-sc
                volumeName: docling-models-pv
                resources:
                  requests:
                    storage: 30Gi
    - chart: backend-service
      repoURL: ghcr.io/unique-ag/helm-charts
      targetRevision: 10.3.0
      helm:
        releaseName: ingestor
        valueFiles:
          - $values/06-applications/defaults/ai-services/ingestor.yaml
          - $values/06-applications/sbx/values/ai-services/ingestor.yaml
        valuesObject: {}
