spec:
  name: ingestor
  autoSync: false
  sources:
    - chart: raw
      repoURL: "https://bedag.github.io/helm-charts"
      targetRevision: 2.0.0
      helm:
        releaseName: docling-models-pvc
        valuesObject:
          resources:
            - apiVersion: v1
              kind: PersistentVolumeClaim
              metadata:
                name: docling-models-pvc
                namespace: unique
              spec:
                accessModes: ["ReadWriteMany"]
                storageClassName: efs-sc
                resources:
                  requests:
                    storage: 30Gi
    - chart: backend-service
      repoURL: ghcr.io/unique-ag/helm-charts
      targetRevision: 10.3.0
      helm:
        releaseName: ingestor
        valueFiles:
          - $values/06-applications/defaults/ai-services/ingestor.yaml
          - $values/06-applications/sbx/value-overlays/ai-services/ingestor.yaml
        valuesObject:
          image:
            tag: "2026.28.1"
