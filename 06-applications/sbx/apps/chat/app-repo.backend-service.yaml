spec:
  name: backend-service-app-repository
  autoSync: false
  sources:
    - repoURL: '<GITHUB_REPO_URL>'
      targetRevision: <GIT_TARGET_REVISION>
      ref: values
    - repoURL: ghcr.io/unique-ag/helm-charts
      chart: backend-service
      targetRevision: 10.3.0
      helm:
        releaseName: backend-service-app-repository
        valueFiles:
          - $values/06-applications/defaults/backend-services/app-repository.yaml
          - $values/06-applications/sbx/value-overlays/backend-services/_all.yaml
          - $values/06-applications/sbx/value-overlays/backend-services/app-repository.yaml
        valuesObject:
          image:
            tag: "2026.22.0"
