# Scope Management backend service configuration (AWS sbx)

# TODO: Enable ZITADEL_WEBHOOK_ENDPOINT after configuring Zitadel Actions API
# env:
#   ZITADEL_WEBHOOK_ENDPOINT: http://backend-service-scope-management.unique.svc/webhook/zitadel-events

image:
  repository: <ECR_REGISTRY_PRIMARY>/backend-service-scope-management

extraRoutes:
  scim:
    enabled: true
    annotations:
      konghq.com/plugins: unique-route-metrics
    parentRefs:
      - name: kong
        namespace: unique
        group: gateway.networking.k8s.io
        kind: Gateway
    hostnames:
      - <DOMAIN_API>
    matches:
      - path:
          type: PathPrefix
          value: /scim
  membership-sync:
    enabled: true
    annotations:
      konghq.com/plugins: unique-route-metrics
    parentRefs:
      - name: kong
        namespace: unique
        group: gateway.networking.k8s.io
        kind: Gateway
    hostnames:
      - <DOMAIN_API>
    matches:
      - path:
          type: PathPrefix
          value: /membership-sync

extraEnvSecrets:
  - scope-management-secrets
