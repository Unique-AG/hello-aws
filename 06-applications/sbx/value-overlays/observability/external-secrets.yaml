# Observability ExternalSecrets for AWS
# Provides secrets for AlertManager and Grafana

resources:
  # AlertManager Slack webhook
  - apiVersion: external-secrets.io/v1beta1
    kind: ExternalSecret
    metadata:
      name: alertmanager-slack-webhook
      namespace: unique
    spec:
      refreshInterval: 1h
      secretStoreRef:
        kind: ClusterSecretStore
        name: aws-secrets-manager
      target:
        name: alertmanager-slack-webhook
      data:
        - secretKey: webhook-url
          remoteRef:
            key: alertmanager-slack-webhook-url

  # Grafana admin credentials
  - apiVersion: external-secrets.io/v1beta1
    kind: ExternalSecret
    metadata:
      name: grafana-admin-credentials
      namespace: unique
    spec:
      refreshInterval: 1h
      secretStoreRef:
        kind: ClusterSecretStore
        name: aws-secrets-manager
      target:
        name: grafana-admin-credentials
        template:
          data:
            admin-user: admin
            admin-password: "{{ .password }}"
      data:
        - secretKey: password
          remoteRef:
            key: grafana-admin-password
