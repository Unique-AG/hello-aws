global:
  priorityClassName: system-node-critical

deploymentMode: SingleBinary

loki:
  commonConfig:
    replication_factor: 1
  auth_enabled: false
  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        index:
          prefix: loki_index_
          period: 24h
        object_store: s3
        schema: v13
  ingester:
    chunk_encoding: snappy
  pattern_ingester:
    enabled: true
  limits_config:
    allow_structured_metadata: true
    volume_enabled: true
    retention_period: 1y
    max_query_lookback: 1y
  livenessProbe:
    httpGet:
      path: "/loki/api/v1/labels?since=1h"
      port: 3100
    initialDelaySeconds: 30
    periodSeconds: 30
  ruler:
    enable_api: true
  storage:
    type: s3
    bucketNames:
      chunks: "<OBSERVABILITY_S3_BUCKET_NAME>"
      ruler: "<OBSERVABILITY_S3_BUCKET_NAME>"
      admin: "<OBSERVABILITY_S3_BUCKET_NAME>"
    s3:
      region: <AWS_REGION>
      s3ForcePathStyle: true
  storage_config:
    tsdb_shipper:
      active_index_directory: /var/loki/tsdb-index
      cache_location: /var/loki/tsdb-cache
    aws:
      region: <AWS_REGION>
      bucketnames: "<OBSERVABILITY_S3_BUCKET_NAME>"
      s3forcepathstyle: true
  compactor:
    working_directory: /var/loki/compactor
    retention_enabled: true
    delete_request_store: s3

serviceAccount:
  name: loki

singleBinary:
  replicas: 1
  persistence:
    storageClass: gp3
    accessModes:
      - ReadWriteOnce
    size: 20Gi
  extraEnv:
    - name: GOMEMLIMIT
      value: 1800MiB
  resources:
    requests:
      cpu: 100m
      memory: 1Gi
    limits:
      memory: 2Gi

monitoring:
  dashboards:
    enabled: true
    annotations:
      grafana_folder: system
    labels:
      grafana_dashboard: "1"
  rules:
    enabled: true
    labels:
      team: infra
  serviceMonitor:
    enabled: true

lokiCanary:
  enabled: false

test:
  enabled: false

# Zero out replica counts of other deployment modes
backend:
  replicas: 0
read:
  replicas: 0
write:
  replicas: 0
ingester:
  replicas: 0
querier:
  replicas: 0
queryFrontend:
  replicas: 0
queryScheduler:
  replicas: 0
distributor:
  replicas: 0
compactor:
  replicas: 0
indexGateway:
  replicas: 0
bloomCompactor:
  replicas: 0
bloomGateway:
  replicas: 0
