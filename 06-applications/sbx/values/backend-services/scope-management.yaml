# Scope Management backend service configuration (AWS sbx)

image:
  repository: <ECR_REGISTRY_THIRDPARTY>/backend-service-scope-management
  tag: "2026.14.1"

extraRoutes:
  scim:
    enabled: true
    annotations:
      konghq.com/plugins: unique-route-metrics
    parentRefs:
      - name: kong
        namespace: unique
        group: gateway.networking.k8s.io
        kind: Gateway
    hostnames:
      - <DOMAIN_API>
    matches:
      - path:
          type: PathPrefix
          value: /scim
  membership-sync:
    enabled: true
    annotations:
      konghq.com/plugins: unique-route-metrics
    parentRefs:
      - name: kong
        namespace: unique
        group: gateway.networking.k8s.io
        kind: Gateway
    hostnames:
      - <DOMAIN_API>
    matches:
      - path:
          type: PathPrefix
          value: /membership-sync

extraEnvSecrets:
  - scope-management-secrets
