# Base configuration for all backend services (AWS sbx)
#
# Domain: hello.aws.unique.dev
# Secrets: AWS Secrets Manager via ExternalSecrets
# Images: ECR pull-through cache

env:
  ADMIN_FRONTEND_URL: https://hello.aws.unique.dev/admin
  CHAT_FRONTEND_URL: https://hello.aws.unique.dev/chat
  CORS_ALLOWED_ORIGINS: https://hello.aws.unique.dev
  INGESTION_UPLOAD_API_URL: https://api.hello.aws.unique.dev/scoped/ingestion/upload
  UNIQUE_INSTALLATION_ID: hello.aws.unique.dev
  ZITADEL_HOST: https://id.hello.aws.unique.dev
  SCOPE_MANAGEMENT_API_URL: http://backend-service-scope-management.unique.svc
  ZITADEL_PROJECT_ID: "368533034342811339"
  ZITADEL_ROOT_ORG_ID: "368533034040821451"
  # Feature flags (aligned with monorepo stable — defaults/stable/_flags.yaml)
  FEATURE_FLAG_ABOUT_SPACE_SECTION_UN_10270: "false"
  FEATURE_FLAG_AGENTIC_TABLE_CONTEXT_UN_14904: "false"
  FEATURE_FLAG_AGENTIC_TABLE_ROW_METADATA_UN_14904: "false"
  FEATURE_FLAG_AGENTIC_TABLE_SHEET_METADATA_UN_14904: "false"
  FEATURE_FLAG_ENABLE_ADVANCED_FORMATTING_UN_9758: "true"
  FEATURE_FLAG_ENABLE_CAN_MANAGE_ACCESS_UN_11608: "false"
  FEATURE_FLAG_ENABLE_ENDPOINT_MODULES_UN_15310: "false"
  FEATURE_FLAG_ENABLE_HTML_RENDERING_UN_15131: "true"
  FEATURE_FLAG_ENABLE_LANDSCAPED_PDF_PAGE_BASED_CHUNKING_UN_10606: "true"
  FEATURE_FLAG_ENABLE_MAGIC_TABLE_UN_8472: "false"
  FEATURE_FLAG_ENABLE_MODULE_BASED_EVENT_DISTRIBUTION_UN_15312: "false"
  FEATURE_FLAG_ENABLE_PPT_PAGE_BASED_CHUNKING_UN_9444: "true"
  FEATURE_FLAG_NET_PROMOTER_SCORE_UI_UN_7747: "true"
  FEATURE_FLAG_SET_PRIVATE_FOLDER_ACCESS_DEFAULT_UN_13988: "false"
  FEATURE_FLAG_USER_API_KEY_GENERATION_UN_11416: "true"
  FEATURE_FLAG_ENABLE_MOVE_FILE_UN_15517: "true"
  FEATURE_FLAG_ENABLE_MOVE_FOLDER_UN_16037: "true"
  FEATURE_FLAG_ENABLE_FILE_BASED_ACCESS_UN_12660: "false"
  FEATURE_FLAG_ENABLE_TIERED_ACCESS_PERMISSIONS_UN_13846: "true"
  FEATURE_FLAG_AGENTIC_TABLE_RERUN_BUTTON_UN_13901: "true"
  FEATURE_FLAG_AGENTIC_TABLE_ROW_RERUN_UN_14903: "true"
  FEATURE_FLAG_AGENTIC_TABLE_ENABLE_NEW_SHARING_UI_UN_16758: "false"
  FEATURE_FLAG_ENABLE_AGENTIC_INGESTION_PAGE_BATCH_FIGURE_EXTRACTION_UN_19457: "true"
  FEATURE_FLAG_ENABLE_ELICITATION_UN_16141: "true"
  FEATURE_FLAG_ENABLE_NEW_ANSWER_FORMATTING_UN_14392: "true"
  FEATURE_FLAG_ENABLE_NEW_ANSWERS_UI_UN_14411: "true"
  FEATURE_FLAG_ENABLE_SELECTED_UPLOADED_FILES_UN_18215: "true"

routes:
  hostname: api.hello.aws.unique.dev
  skipCrdCheck: true

# Disable Azure secretProvider (use ExternalSecrets for AWS instead)
# Secrets are pulled from AWS Secrets Manager via ClusterSecretStore
secretProvider: null

resources:
  requests:
    cpu: 50m
    memory: 220Mi
  limits:
    cpu: 500m
    memory: 512Mi

podAnnotations:
  reloader.stakater.com/auto: "true"

nodeSelector: null

serviceAccount:
  workloadIdentity:
    enabled: false

keda:
  skipCrdCheck: true
