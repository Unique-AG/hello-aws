# gp3 StorageClass for AWS EBS CSI Driver
resources:
  - apiVersion: storage.k8s.io/v1
    kind: StorageClass
    metadata:
      name: gp3
      annotations:
        storageclass.kubernetes.io/is-default-class: "true"
    provisioner: ebs.csi.aws.com
    parameters:
      type: gp3
      fsType: ext4
      encrypted: "true"
      kmsKeyId: arn:aws:kms:<AWS_REGION>:<AWS_ACCOUNT_ID>:key/30d4470d-c11f-4890-b17a-4077c7e2976d
    volumeBindingMode: WaitForFirstConsumer
    allowVolumeExpansion: true
    reclaimPolicy: Delete
