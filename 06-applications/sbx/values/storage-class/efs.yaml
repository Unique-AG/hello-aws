# EFS StorageClass + static PersistentVolume for Docling models
# Provides ReadWriteMany (RWX) access for horizontal ingestor scaling
resources:
  - apiVersion: storage.k8s.io/v1
    kind: StorageClass
    metadata:
      name: efs-sc
    provisioner: efs.csi.aws.com
    parameters:
      provisioningMode: efs-ap
      fileSystemId: fs-070ce1b868e568369
      directoryPerms: "700"
    mountOptions:
      - tls
    reclaimPolicy: Retain
    volumeBindingMode: Immediate

  - apiVersion: v1
    kind: PersistentVolume
    metadata:
      name: docling-models-pv
    spec:
      capacity:
        storage: 30Gi
      volumeMode: Filesystem
      accessModes:
        - ReadWriteMany
      persistentVolumeReclaimPolicy: Retain
      storageClassName: efs-sc
      csi:
        driver: efs.csi.aws.com
        volumeHandle: "fs-070ce1b868e568369::fsap-028d9bf90ad1cc6e4"
      mountOptions:
        - tls
