# EFS StorageClass for dynamic provisioning
# Provides ReadWriteMany (RWX) access for horizontal ingestor scaling
# CSI controller automatically creates EFS access points per PVC
resources:
  - apiVersion: storage.k8s.io/v1
    kind: StorageClass
    metadata:
      name: efs-sc
    provisioner: efs.csi.aws.com
    parameters:
      provisioningMode: efs-ap
      fileSystemId: fs-070ce1b868e568369
      directoryPerms: "755"
      uid: "1000"
      gid: "1000"
    mountOptions:
      - tls
    reclaimPolicy: Retain
    volumeBindingMode: Immediate
