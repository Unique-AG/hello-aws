# LiteLLM Proxy for AWS EKS
# Uses AWS Bedrock via EKS Pod Identity (no static credentials)
# Database: Aurora PostgreSQL, Cache: ElastiCache Redis (TLS)

replicaCount: 1

image:
  repository: ghcr.io/berriai/litellm-database
  tag: "litellm_stable_release_branch-v1.81.3-stable"
  pullPolicy: IfNotPresent

# Service account for Bedrock access (Pod Identity association managed by Terraform)
serviceAccount:
  create: true

podAnnotations:
  reloader.stakater.com/auto: "true"

resources:
  requests:
    cpu: 250m
    memory: 500Mi
  limits:
    memory: 1Gi

# Database config - secrets injected via secretFrom
db:
  deployStandalone: false
  useExisting: false

# Inject litellm K8s secret (DATABASE_URL, PROXY_MASTER_KEY, LITELLM_SALT_KEY)
secretFrom:
  name: litellm

# Environment variables (ConfigMap)
env:
  LITELLM_LOG: "INFO"
  LITELLM_MODE: PRODUCTION
  REDIS_URL: "rediss://master.redis-uq-dogfood-sbx-euc2.jwixqt.euc2.cache.amazonaws.com:6380/0"

# Migration job for Prisma schema
hooks:
  migration:
    enabled: true
    command: |
      python litellm/proxy/prisma_migration.py

# Proxy configuration
proxy_config:
  model_list:
    # Anthropic Claude models via AWS Bedrock cross-region inference profiles
    # Uses eu.* inference profile IDs (required for on-demand invocation)
    - model_name: anthropic-claude-sonnet-4-5
      litellm_params:
        model: bedrock/eu.anthropic.claude-sonnet-4-5-20250929-v1:0
        aws_region_name: eu-central-2
        max_tokens: 10000

    - model_name: anthropic-claude-opus-4-5
      litellm_params:
        model: bedrock/eu.anthropic.claude-opus-4-5-20251101-v1:0
        aws_region_name: eu-central-2
        max_tokens: 10000

    - model_name: anthropic-claude-opus-4-6
      litellm_params:
        model: bedrock/eu.anthropic.claude-opus-4-6-v1
        aws_region_name: eu-central-2
        max_tokens: 20000

    - model_name: anthropic-claude-haiku-4-5
      litellm_params:
        model: bedrock/eu.anthropic.claude-haiku-4-5-20251001-v1:0
        aws_region_name: eu-central-2
        max_tokens: 10000

    - model_name: anthropic-claude-3-5-sonnet
      litellm_params:
        model: bedrock/eu.anthropic.claude-3-5-sonnet-20240620-v1:0
        aws_region_name: eu-central-2
        max_tokens: 8192

    - model_name: anthropic-claude-3-haiku
      litellm_params:
        model: bedrock/eu.anthropic.claude-3-haiku-20240307-v1:0
        aws_region_name: eu-central-2
        max_tokens: 4096

    - model_name: anthropic-claude-sonnet-4-6
      litellm_params:
        model: bedrock/eu.anthropic.claude-sonnet-4-6
        aws_region_name: eu-central-2
        max_tokens: 10000

    # model_name must match the toolkit ID (qwen-3-235B-A22B), which differs
    # from the Bedrock model ID (qwen.qwen3-235b-a22b-2507-v1:0)
    - model_name: qwen-3-235B-A22B
      litellm_params:
        model: bedrock/qwen.qwen3-235b-a22b-2507-v1:0
        aws_region_name: eu-central-2
        max_tokens: 10000

    - model_name: amazon-titan-embed-text-v2
      litellm_params:
        model: bedrock/amazon.titan-embed-text-v2:0
        aws_region_name: eu-central-2

    # MiniMax M2.5 via AWS Bedrock — not available in eu-central-2; pinned to
    # eu-central-1 (no EU CRI exists for MiniMax). Cross-region invocation
    # leaves Switzerland; acceptable for hello-aws reference deployment only.
    - model_name: minimax-m2-5
      litellm_params:
        model: bedrock/minimax.minimax-m2.5
        aws_region_name: eu-central-1
        max_tokens: 8192

    # Gemma-4-31B-IT self-hosted on a SageMaker real-time endpoint in
    # ap-northeast-2. The endpoint serves an OpenAI-compatible chat schema
    # (vLLM backend), so use the sagemaker_chat provider. This is a cross-region
    # call from the eu-central-2 cluster (data leaves the EU) — sandbox/reference
    # deployment only. Same AWS account; auth via the litellm Pod Identity role,
    # which needs sagemaker:InvokeEndpoint + InvokeEndpointWithResponseStream on
    # this endpoint (05-compute iam.tf) — apply that layer before this syncs.
    # *_cost_per_token: rough amortized placeholder so this self-hosted model
    # shows non-zero spend in spend logs / max_budget (LiteLLM has no price map
    # for a self-hosted endpoint). Tune to real $/token if cost tracking matters.
    - model_name: gemma-4-31b-it
      litellm_params:
        model: sagemaker_chat/gemma-4-31b
        aws_region_name: ap-northeast-2
        max_tokens: 4096
        input_cost_per_token: 0.000001
        output_cost_per_token: 0.000001

    # GPT-4o via Azure AI Foundry. api_base and api_key come from K8s env vars
    # set by the `litellm` ExternalSecret (sourced from AWS Secrets Manager,
    # populated by the Azure GHA workflow's push-to-aws-secrets job).
    - model_name: gpt-4o
      litellm_params:
        model: azure/gpt-4o
        api_base: os.environ/AZURE_FOUNDRY_ENDPOINT
        api_key: os.environ/AZURE_FOUNDRY_API_KEY
        api_version: "2024-10-21"

    - model_name: gpt-4o-2024-11-20
      litellm_params:
        model: azure/gpt-4o
        api_base: os.environ/AZURE_FOUNDRY_ENDPOINT
        api_key: os.environ/AZURE_FOUNDRY_API_KEY
        api_version: "2024-10-21"

    - model_name: azure-gpt-4o
      litellm_params:
        model: azure/gpt-4o
        api_base: os.environ/AZURE_FOUNDRY_ENDPOINT
        api_key: os.environ/AZURE_FOUNDRY_API_KEY
        api_version: "2024-10-21"

    - model_name: gpt-4-turbo
      litellm_params:
        model: bedrock/eu.anthropic.claude-sonnet-4-5-20250929-v1:0
        aws_region_name: eu-central-2
        max_tokens: 10000

    - model_name: gpt-4-32k
      litellm_params:
        model: bedrock/eu.anthropic.claude-sonnet-4-5-20250929-v1:0
        aws_region_name: eu-central-2
        max_tokens: 10000

    # Embedding model alias (for ingestion service Azure OpenAI SDK compatibility)
    # Maps text-embedding-ada-002 to Cohere Embed v4 (1536 dims)
    # model: sets provider mapping, model_id: sets Bedrock inference profile ARN
    - model_name: text-embedding-ada-002
      litellm_params:
        model: bedrock/cohere.embed-v4:0
        model_id: arn:aws:bedrock:eu-central-2:217381566492:application-inference-profile/rzhpiygtmfxm
        aws_region_name: eu-central-2

  general_settings:
    master_key: os.environ/PROXY_MASTER_KEY
    alerting: []
    proxy_batch_write_at: 60
    database_connection_pool_limit: 10
    disable_spend_logs: false
    disable_error_logs: false

  litellm_settings:
    modify_params: true
    drop_params: true
    turn_off_message_logging: false
    max_budget: 10000
    budget_duration: 30d
    json_logs: true
    cache: true
    cache_params:
      type: redis
      namespace: "litellm.caching.caching"
    redact_messages_in_exceptions: true
    request_timeout: 600
    set_verbose: false

securityContext:
  allowPrivilegeEscalation: false

ingress:
  enabled: false
