# AWS-specific configuration for Docling ingestor service

image:
  repository: 217381566492.dkr.ecr.eu-central-2.amazonaws.com/uniquecr/ingestors
  tag: "2026.06.1"

env:
  REDIS_PORT: "6380"
  REDIS_USE_TLS: "true"

secretProvider: rediss://master.redis-uq-dogfood-sbx-euc2.jwixqt.euc2.cache.amazonaws.com:6380/0

podSecurityContext:
  fsGroup: 1000

routes:
  skipCrdCheck: true

serviceAccount:
  create: true

nodeSelector: rediss://master.redis-uq-dogfood-sbx-euc2.jwixqt.euc2.cache.amazonaws.com:6380/0

podAnnotations:
  reloader.stakater.com/auto: "true"

extraEnvSecrets:
  - ingestor-secrets
