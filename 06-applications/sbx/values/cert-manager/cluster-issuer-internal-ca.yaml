# Internal CA issuer chain for in-cluster TLS
# Self-signed root → CA certificate → ClusterIssuer
# Used by Kong for internal ALB TLS (CloudFront VPC Origin terminates external TLS)
resources:
  - apiVersion: cert-manager.io/v1
    kind: ClusterIssuer
    metadata:
      name: selfsigned-issuer
    spec:
      selfSigned: {}

  - apiVersion: cert-manager.io/v1
    kind: Certificate
    metadata:
      name: internal-ca
      namespace: unique
    spec:
      isCA: true
      commonName: internal-ca
      secretName: internal-ca-secret
      privateKey:
        algorithm: ECDSA
        size: 256
      issuerRef:
        name: selfsigned-issuer
        kind: ClusterIssuer

  - apiVersion: cert-manager.io/v1
    kind: ClusterIssuer
    metadata:
      name: internal-ca-issuer
    spec:
      ca:
        secretName: internal-ca-secret
