# Broader smoke: one check per area (browser + API). Self-contained — tests
# live in ./e2e in this repo. Manual dispatch + a weekday-morning schedule.
name: "e2e · AWS Smoke"

permissions:
  contents: read

# Shared across watchdog + smoke: one test user on one tenant must never run
# two suites at once (they'd race the same session/spaces).
concurrency:
  group: e2e-aws-suite
  cancel-in-progress: false

on:
  workflow_dispatch:
  schedule:
    - cron: "0 5 * * 1-5"   # 07:00 CEST (05:00 UTC), Mon–Fri

jobs:
  smoke:
    name: 💨 AWS Smoke (browser + API)
    runs-on: ubuntu-latest
    # Secrets/vars live in this gated Environment (add required reviewers +
    # restrict to the default branch in repo settings → Environments).
    environment: e2e-aws
    timeout-minutes: 25
    defaults:
      run:
        working-directory: e2e
    env:
      CI: "true"
      TEST_ENV: AWS
      # All tenant-identifying values are Environment secrets (not plaintext vars).
      BASE_DOMAIN: ${{ secrets.BASE_DOMAIN }}
      TEST_USER: ${{ secrets.TEST_USER }}
      PASSWORD: ${{ secrets.PASSWORD }}
      ZITADEL_UNIQUE_APP_PROJECT_ID: ${{ secrets.ZITADEL_UNIQUE_APP_PROJECT_ID }}
      SERVICE_USER_CLIENT_ID: ${{ secrets.SERVICE_USER_CLIENT_ID }}
      SERVICE_USER_CLIENT_SECRET: ${{ secrets.SERVICE_USER_CLIENT_SECRET }}
      SLACK_WEBHOOK_URL: ${{ secrets.E2E_SLACK_WEBHOOK_URL }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
      - run: npm install --no-audit --no-fund
      - run: npx playwright install --with-deps chromium
      - run: npm run test:smoke
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: ${{ !cancelled() }}
        with:
          name: e2e-report-smoke
          path: e2e/playwright-report/
          retention-days: 30
      - name: Alert on failure (optional)
        if: ${{ failure() && env.SLACK_WEBHOOK_URL != '' }}
        uses: slackapi/slack-github-action@45a88b9581bfab2566dc881e2cd66d334e621e2c # v3.0.3
        with:
          webhook: ${{ env.SLACK_WEBHOOK_URL }}
          webhook-type: webhook-trigger
          payload: |
            text: "💨 AWS smoke failed (${{ github.repository }}) — https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
