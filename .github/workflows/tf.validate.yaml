name: '[tf] Validate'
on:
  pull_request:
    paths:
      - '0[1-5]-*/**'
      - 'modules/**'
      - 'scripts/**'
      - 'common.auto.tfvars.template'
      - '.github/workflows/tf.validate.yaml'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        layer: [bootstrap, governance, infrastructure, data-and-ai, compute]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_version: '1.14.0'

      - name: Install tflint
        uses: terraform-linters/setup-tflint@6e87008f9dd1fe3e34e66aca6c97b4a69f72a7f4 # v4

      - name: Install trivy
        # trivy-action installs trivy as a side effect; we use it for the install
        # so scripts/validate.sh runs the real terraform scan in the next step.
        # Track the action's default trivy version to avoid pinning to an upstream
        # release whose install path can break (as v0.69.1 does today via the
        # get.trivy.dev 404). Keep local trivy in sync via `brew upgrade trivy`.
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: scripts
          scanners: misconfig
          severity: CRITICAL
          exit-code: '0'

      - name: Install checkov
        # Pinned to match local scripts/validate.sh output. Bumping this can
        # introduce new checks — update docs/security-baseline.md + inline skips
        # before upgrading.
        run: pipx install checkov==3.2.500

      - name: Render common.auto.tfvars
        # main keeps only the .template (rendered file is gitignored). The script
        # needs the rendered file for variable resolution.
        run: cp common.auto.tfvars.template common.auto.tfvars

      - name: Validate (lint-only, no backend)
        run: ./scripts/validate.sh ${{ matrix.layer }} sbx true
