name: '[tf] [sbx] Deploy'
on:
  push:
    branches: [deploy/sbx]
    paths: ['0[1-5]-*/**', 'modules/**', 'common.auto.tfvars']
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  AWS_REGION: eu-central-2

concurrency:
  group: sbx-deploy
  cancel-in-progress: false

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
      - name: Derive semantic_version from git
        # git describe needs full history + tags (fetch-depth: 0). Falls back
        # to a short SHA when no tag exists. Exported as TF_VAR_ so Terraform
        # picks it up; TF_VAR_ env is lower precedence than any -var-file, so
        # semantic_version must NOT be set in common.auto.tfvars.
        run: echo "TF_VAR_semantic_version=$(git describe --tags --always)" >> "$GITHUB_ENV"
      - uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4.3.1
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - uses: ./.github/actions/terraform
        with:
          working_directory: 01-bootstrap/terraform
          backend_config: environments/sbx/backend-config.hcl
          var_files: ../../common.auto.tfvars environments/sbx/00-config.auto.tfvars
          plan_name: sbx-bootstrap
          apply_branch: deploy/sbx
          github_token: ${{ secrets.GITHUB_TOKEN }}

  governance:
    needs: bootstrap
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
      - name: Derive semantic_version from git
        run: echo "TF_VAR_semantic_version=$(git describe --tags --always)" >> "$GITHUB_ENV"
      - uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4.3.1
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - uses: ./.github/actions/terraform
        with:
          working_directory: 02-governance/terraform
          backend_config: environments/sbx/backend-config.hcl
          var_files: ../../common.auto.tfvars environments/sbx/00-config.auto.tfvars
          plan_name: sbx-governance
          apply_branch: deploy/sbx
          github_token: ${{ secrets.GITHUB_TOKEN }}

  infrastructure:
    needs: governance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
      - name: Derive semantic_version from git
        run: echo "TF_VAR_semantic_version=$(git describe --tags --always)" >> "$GITHUB_ENV"
      - uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4.3.1
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - uses: ./.github/actions/terraform
        with:
          working_directory: 03-infrastructure/terraform
          backend_config: environments/sbx/backend-config.hcl
          var_files: ../../common.auto.tfvars environments/sbx/00-config.auto.tfvars
          plan_name: sbx-infrastructure
          apply_branch: deploy/sbx
          github_token: ${{ secrets.GITHUB_TOKEN }}

  data-and-ai:
    needs: infrastructure
    # ubuntu-latest: every resource in this layer is managed via the public
    # AWS API. No in-cluster (helm/kubernetes/postgresql) providers are used,
    # so VPC reach isn't required. Revisit if a kubernetes-side provider is
    # added or buckets switch to VPC-only access.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
      - name: Derive semantic_version from git
        run: echo "TF_VAR_semantic_version=$(git describe --tags --always)" >> "$GITHUB_ENV"
      - uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4.3.1
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - uses: ./.github/actions/terraform
        with:
          working_directory: 04-data-and-ai/terraform
          backend_config: environments/sbx/backend-config.hcl
          var_files: ../../common.auto.tfvars environments/sbx/00-config.auto.tfvars
          plan_name: sbx-data-and-ai
          apply_branch: deploy/sbx
          github_token: ${{ secrets.GITHUB_TOKEN }}

  compute:
    # data-and-ai too: 05-compute reads data.terraform_remote_state.data_and_ai
    # (Prometheus workspace, observability S3), so layer 04 must finish first.
    needs: [infrastructure, data-and-ai]
    # ubuntu-latest: terraform manages aws_eks_cluster via the public AWS
    # API. The cluster's k8s API can be private (no kubectl/helm in CI). If
    # we later add a kubernetes/helm provider, this job has to move to a
    # VPC-attached runner.
    runs-on: ubuntu-latest
    env:
      TF_VAR_acr_username: ${{ secrets.TF_VAR_ACR_USERNAME }}
      TF_VAR_acr_password: ${{ secrets.TF_VAR_ACR_PASSWORD }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
      - name: Derive semantic_version from git
        run: echo "TF_VAR_semantic_version=$(git describe --tags --always)" >> "$GITHUB_ENV"
      - uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4.3.1
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - uses: ./.github/actions/terraform
        with:
          working_directory: 05-compute/terraform
          backend_config: environments/sbx/backend-config.hcl
          var_files: ../../common.auto.tfvars environments/sbx/00-config.auto.tfvars
          plan_name: sbx-compute
          apply_branch: deploy/sbx
          github_token: ${{ secrets.GITHUB_TOKEN }}
