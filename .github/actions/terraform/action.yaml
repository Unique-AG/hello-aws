name: "Terraform"
description: "Composite action for Terraform fmt, init, validate, plan, and apply. Posts the plan to the PR and applies a saved plan on push to the target branch."

inputs:
  working_directory:
    description: "The directory containing the Terraform configuration"
    required: true
  terraform_version:
    description: "The version of Terraform to use"
    required: false
    default: "1.14.0"
  plan_name:
    description: "Name used to identify the plan in PR comments. Must be unique per caller — used as a sentinel to locate the bot comment to update."
    required: true
  github_token:
    description: "GitHub token for posting PR comments"
    required: true
  backend_config:
    description: "Backend config file for terraform init (optional)"
    required: false
    default: ""
  var_files:
    description: "Space-separated var-file paths relative to working_directory (optional)"
    required: false
    default: ""
  apply_branch:
    description: "Branch that triggers terraform apply on push"
    required: false
    default: "main"
  apply_on_push:
    description: "Whether to run terraform apply on push to the apply branch"
    required: false
    default: "true"

outputs:
  fmt_outcome:
    description: "Outcome of terraform fmt"
    value: ${{ steps.fmt.outcome }}
  init_outcome:
    description: "Outcome of terraform init"
    value: ${{ steps.init.outcome }}
  validate_outcome:
    description: "Outcome of terraform validate"
    value: ${{ steps.validate.outcome }}
  plan_outcome:
    description: "Outcome of terraform plan"
    value: ${{ steps.plan.outcome }}
  apply_outcome:
    description: "Outcome of terraform apply"
    value: ${{ steps.apply.outcome }}

runs:
  using: "composite"
  steps:
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
      with:
        terraform_version: ${{ inputs.terraform_version }}

    - name: Run Terraform format check
      id: fmt
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      continue-on-error: true
      run: terraform fmt -check -recursive

    - name: Run Terraform init
      id: init
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      env:
        BACKEND_CONFIG: ${{ inputs.backend_config }}
      run: |
        if [ -n "$BACKEND_CONFIG" ]; then
          terraform init -input=false -backend-config="$BACKEND_CONFIG"
        else
          terraform init -input=false
        fi

    - name: Run Terraform validate
      id: validate
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      run: terraform validate -no-color

    - name: Build var-file args
      id: varfiles
      shell: bash
      env:
        VAR_FILES: ${{ inputs.var_files }}
      run: |
        VAR_FILE_ARGS=""
        if [ -n "$VAR_FILES" ]; then
          for f in $VAR_FILES; do
            VAR_FILE_ARGS="$VAR_FILE_ARGS -var-file=$f"
          done
        fi
        echo "args=$VAR_FILE_ARGS" >> "$GITHUB_OUTPUT"

    - name: Run Terraform plan
      id: plan
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      env:
        PLAN_PATH: ${{ runner.temp }}/tfplan
        PLAN_TEXT_PATH: ${{ runner.temp }}/tfplan.txt
        VAR_FILE_ARGS: ${{ steps.varfiles.outputs.args }}
      run: |
        # shellcheck disable=SC2086  # intentional word-splitting of var-file args
        terraform plan -out="$PLAN_PATH" -input=false -lock-timeout=10m $VAR_FILE_ARGS
        terraform show -no-color "$PLAN_PATH" > "$PLAN_TEXT_PATH"
        echo "plan_file=$PLAN_PATH" >> "$GITHUB_OUTPUT"
        echo "plan_text_file=$PLAN_TEXT_PATH" >> "$GITHUB_OUTPUT"

    - name: Post Terraform plan to PR
      if: always() && github.event_name == 'pull_request'
      uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
      env:
        PLAN_TEXT_FILE: ${{ steps.plan.outputs.plan_text_file }}
        PLAN_NAME: ${{ inputs.plan_name }}
        FMT_OUTCOME: ${{ steps.fmt.outcome }}
        INIT_OUTCOME: ${{ steps.init.outcome }}
        VALIDATE_OUTCOME: ${{ steps.validate.outcome }}
        PLAN_OUTCOME: ${{ steps.plan.outcome }}
        APPLY_ON_PUSH: ${{ inputs.apply_on_push }}
      with:
        github-token: ${{ inputs.github_token }}
        script: |
          const fs = require('fs');
          const planName = process.env.PLAN_NAME;
          const sentinel = `<!-- tf-plan:${planName} -->`;

          // Read plan text — may be missing if the plan step failed
          let plan = '';
          let planReadError = null;
          try {
            const planPath = process.env.PLAN_TEXT_FILE;
            if (planPath && fs.existsSync(planPath)) {
              plan = fs.readFileSync(planPath, 'utf8');
            } else {
              planReadError = 'Plan file not produced — see job logs for the failing step.';
            }
          } catch (e) {
            planReadError = `Failed to read plan: ${e.message}`;
          }

          // Locate an existing bot comment for this exact plan_name (via hidden sentinel,
          // not substring matching, to avoid cross-matching across similar plan names).
          const { data: comments } = await github.rest.issues.listComments({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
          });
          const botComment = comments.find(c => c.user.type === 'Bot' && c.body.includes(sentinel));

          // Timestamp with dynamically-computed timezone abbreviation (avoids hardcoding CEST
          // which would be wrong in winter when CET applies).
          const tz = 'Europe/Zurich';
          const now = new Date();
          const timestamp = now.toLocaleString('en-CH', {
            timeZone: tz,
            year: 'numeric', month: '2-digit', day: '2-digit',
            hour: '2-digit', minute: '2-digit', second: '2-digit',
            hour12: false,
          });
          const tzAbbr = new Intl.DateTimeFormat('en', {
            timeZone: tz, timeZoneName: 'short',
          }).formatToParts(now).find(p => p.type === 'timeZoneName')?.value ?? tz;

          const noChanges = plan.includes('No changes.') && plan.includes('found no differences');
          const planSection = planReadError
            ? `⚠️ ${planReadError}`
            : plan.length > 60000
              ? 'Plan is too large to display. Please check the actions output for the full plan.'
              : `<details><summary>Show Plan</summary>\n\n\`\`\`\n${plan}\n\`\`\`\n</details>`;

          const applyDisabled = process.env.APPLY_ON_PUSH === 'false';
          const applyWarning = applyDisabled
            ? [
                '> [!CAUTION]',
                '> ## ⛔ AUTO-APPLY IS DISABLED ⛔',
                '> This workflow will **NOT** automatically apply changes when merged.',
                '> Manual intervention is required to apply this plan.',
                '',
              ].join('\n')
            : '';

          const statusIcon = planReadError
            ? '❌ **Plan failed** — see job logs.'
            : (noChanges ? '✅ **No changes** — infrastructure matches the configuration.' : '☢️ **Drift detected** — inspect plan!');

          const body = [
            sentinel,
            `### ${planName}`,
            `*Last updated: ${timestamp} ${tzAbbr}*`,
            '',
            applyWarning,
            `- 🖌 \`fmt\`: \`${process.env.FMT_OUTCOME}\``,
            `- ⚙️ \`init\`: \`${process.env.INIT_OUTCOME}\``,
            `- 🤖 \`validate\`: \`${process.env.VALIDATE_OUTCOME}\``,
            `- 📖 \`plan\`: \`${process.env.PLAN_OUTCOME}\``,
            '',
            statusIcon,
            '',
            planSection,
            '',
            `*Pusher: @${context.actor}, Action: \`${context.eventName}\`, Env: \`${planName}\`, Workflow: \`${context.workflow}\`*`,
          ].join('\n');

          if (botComment) {
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: botComment.id,
              body,
            });
          } else {
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });
          }

    - name: Run Terraform apply
      id: apply
      if: >-
        success() &&
        github.event_name == 'push' &&
        github.ref == format('refs/heads/{0}', inputs.apply_branch) &&
        inputs.apply_on_push != 'false'
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      env:
        PLAN_PATH: ${{ steps.plan.outputs.plan_file }}
      run: terraform apply -input=false -lock-timeout=10m "$PLAN_PATH"

    - name: Get Terraform outputs
      id: tf_outputs
      if: steps.apply.outcome == 'success'
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      env:
        OUTPUTS_PATH: ${{ runner.temp }}/tf_outputs.json
      run: |
        terraform output -json | jq 'with_entries(select(.value.sensitive != true))' > "$OUTPUTS_PATH"
        echo "outputs_file=$OUTPUTS_PATH" >> "$GITHUB_OUTPUT"

    - name: Post Terraform outputs to step summary
      if: steps.apply.outcome == 'success'
      uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
      env:
        OUTPUTS_FILE: ${{ steps.tf_outputs.outputs.outputs_file }}
        PLAN_NAME: ${{ inputs.plan_name }}
      with:
        script: |
          const fs = require('fs');
          const planName = process.env.PLAN_NAME;

          let outputsContent = '';
          try {
            const outputsJson = JSON.parse(fs.readFileSync(process.env.OUTPUTS_FILE, 'utf8'));
            const outputKeys = Object.keys(outputsJson).filter(key => !outputsJson[key].sensitive);
            if (outputKeys.length === 0) {
              outputsContent = '_No outputs defined._';
            } else {
              const rows = ['<table>', '<tr><th>Output</th><th>Value</th></tr>'];
              for (const key of outputKeys) {
                const output = outputsJson[key];
                let value;
                if (typeof output.value === 'object' && output.value !== null) {
                  const formatted = JSON.stringify(output.value, null, 2);
                  const escaped = formatted.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                  value = `<details><summary>Show</summary>\n\n<pre>${escaped}</pre>\n\n</details>`;
                } else {
                  const escaped = JSON.stringify(output.value).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                  value = `<code>${escaped}</code>`;
                }
                rows.push(`<tr><td><code>${key}</code></td><td>\n\n${value}\n\n</td></tr>`);
              }
              rows.push('</table>');
              outputsContent = rows.join('\n');
            }
          } catch (e) {
            outputsContent = `_Failed to parse outputs: ${e.message}_`;
          }

          const tz = 'Europe/Zurich';
          const now = new Date();
          const timestamp = now.toLocaleString('en-CH', {
            timeZone: tz,
            year: 'numeric', month: '2-digit', day: '2-digit',
            hour: '2-digit', minute: '2-digit', second: '2-digit',
            hour12: false,
          });
          const tzAbbr = new Intl.DateTimeFormat('en', {
            timeZone: tz, timeZoneName: 'short',
          }).formatToParts(now).find(p => p.type === 'timeZoneName')?.value ?? tz;

          const summary = [
            `## 🚀 Terraform Apply: ${planName}`,
            '',
            `**Applied at:** ${timestamp} ${tzAbbr}`,
            `**Actor:** @${context.actor}`,
            `**Workflow:** \`${context.workflow}\``,
            '',
            '### Outputs',
            '',
            outputsContent,
          ].join('\n');

          await core.summary.addRaw(summary).write();
